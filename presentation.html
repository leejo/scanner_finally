# The Scanner In Question

* A Hasselblad Imacon Flextight X1

* Offered to me at: 5,000 EUR

![:scale 65%](img/msrp.png)

???

Reading from my blog post here...

This thing is remarkable. The bigger brother (the X5) even more so. Imacon/Hasselblad had a load of patents on the technology that means no other manufacturer can replicate it. There are other high spec scanning solutions, of course, but none that come close to this form factor.

The scanner is relatively simple - a clever mechanism to ensure the film stays flat (a “virtual drum”), a good quality constant light source, a very expensive and extremely high quality Rodenstock lens that has its focus precisely adjusted for every single scan, and a decent quality CCD to capture the image (scan). This is all held inside a mostly empty box.

The history is that Hasselblad merged with Imacon in 2004 for their digital back / CCD technology. This is because Hasselblad were interested in creating digital backs for their, at the time, H range of medium format cameras. The scanners were included as part of the deal with the deal stating that Hasselblad had to honour that for at least x years (15 years maybe?).

15 years passed, at which point Hasselblad discontinued the scanners. The cost of modernising the components and interfaces was not worth it. In fact, only 7 years passed before Hasselblad effectively discontinued them as that was when they stopped updating the software.

So you now have a not-insignificant number of owners of these scanners that are approaching end of life with little option to replace or repair them.

* So why "almost"?

# Film Flatness

Or lack thereof:

![:scale 80%](img/film_not_flat.jpg)

???

* Film is rarely flat, especially so with 35mm. These are pretty mild examples of curl.

* It tends to be flatter in the larger formats but then you get into flatness issues due to it sagging

* The smallest difference in the film plane can cause major issues in sharpness due to focus fall off (film scanning is essentially macro photography)

* Any workflow or solution that does not take this into account is significantly compromised. And the workflow is only as good as its weakest part.

* This is the biggest problem in scanning film - all other considerations are more than adequate these days: resolution, dynamic range, etc.
